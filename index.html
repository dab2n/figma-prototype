<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=360, initial-scale=1">
<title>Newton — Home</title>
<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="styles/home.css">
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="status-bar">
      <span class="clock">9:41</span>
      <div class="icons">
        <img src="assets/icons/statusbar-wifi-light.svg" alt="">
        <img src="assets/icons/statusbar-mobiledata-light.svg" alt="">
        <img class="battery" src="assets/icons/statusbar-battery1-light.svg" alt="">
      </div>
    </div>

    <div class="app-bar">
      <img class="logo" src="assets/photos/logo-newton-brand.png" alt="Newton">
      <div class="actions">
        <img src="assets/icons/appbar-bell.svg" alt="알림">
        <img src="assets/icons/appbar-search.svg" alt="검색">
      </div>
    </div>

    <div class="hero-scroll">
      <a class="hero-card" href="pyeongso.html" aria-label="Sean's Final 1km Pace">
        <img class="hero-card-img" src="assets/photos/card-sean.png" alt="Sean's Final 1km Pace">
        <span class="hero-btn-hotspot" aria-hidden="true"></span>
      </a>
      <a class="hero-card" href="pyeongso.html" aria-label="Akiyama's Ghost Step">
        <img class="hero-card-img" src="assets/photos/card-akiyama.png" alt="Akiyama's Ghost Step">
        <span class="hero-btn-hotspot" aria-hidden="true"></span>
      </a>
      <a class="hero-card" href="pyeongso.html" aria-label="Curry's Step Back">
        <img class="hero-card-img" src="assets/photos/card-curry.png" alt="Curry's Step Back">
        <span class="hero-btn-hotspot" aria-hidden="true"></span>
      </a>
    </div>

    <section class="section">
      <div class="section-title t-subtitle-b">
        Recently Viewed
        <img src="assets/icons/section-icon-recently.svg" alt="">
      </div>
      <div class="recent-list">
        <a class="recent-item" href="pyeongso.html">
          <img class="recent-thumb" src="assets/photos/recent-basketball.png" alt="">
          <div class="recent-info">
            <p class="t-body-bold">Basketball Basic Dribble</p>
            <div class="recent-meta t-caption-regular">
              <span>Janghoon</span><img class="sep" src="assets/icons/dot-sep-small.svg" alt=""><span class="dim">12m</span>
            </div>
          </div>
          <img class="play" src="assets/icons/play-btn1.svg" alt="재생">
        </a>
        <a class="recent-item" href="pyeongso.html">
          <img class="recent-thumb" src="assets/photos/recent-running.png" alt="">
          <div class="recent-info">
            <p class="t-body-bold">Running Intervals</p>
            <div class="recent-meta t-caption-regular">
              <span>Daniel</span><img class="sep" src="assets/icons/dot-sep-small.svg" alt=""><span class="dim">18m</span>
            </div>
          </div>
          <img class="play" src="assets/icons/play-btn1.svg" alt="재생">
        </a>
        <a class="recent-item" href="pyeongso.html">
          <img class="recent-thumb" src="assets/photos/recent-tennis.png" alt="">
          <div class="recent-info">
            <p class="t-body-bold">The Tennis Skill</p>
            <div class="recent-meta t-caption-regular">
              <span>Sojin</span><img class="sep" src="assets/icons/dot-sep-small2.svg" alt=""><span class="dim">20m</span>
            </div>
          </div>
          <img class="play" src="assets/icons/play-btn2.svg" alt="재생">
        </a>
      </div>
    </section>

    <section class="section">
      <div class="section-title t-subtitle-b">
        Today's Movement
        <img src="assets/icons/section-icon-movement.svg" alt="">
      </div>
      <div class="movement-scroll">
        <a class="movement-card" href="pyeongso.html">
          <div class="movement-collage">
            <img src="assets/photos/movement-collage1.png" alt="">
            <img src="assets/photos/movement-collage2.png" alt="">
            <img src="assets/photos/movement-collage3.png" alt="">
            <img src="assets/photos/movement-collage4.png" alt="">
          </div>
          <p class="t-body-bold">Basketball Highlight</p>
          <p class="t-caption-regular dim">Pro Pack</p>
        </a>
        <a class="movement-card" href="pyeongso.html">
          <img class="movement-photo" src="assets/photos/movement-boxing.png" alt="">
          <p class="t-body-bold">Boxing Basic Jab Combo</p>
          <p class="t-caption-regular dim">Skilled</p>
        </a>
        <a class="movement-card" href="pyeongso.html">
          <img class="movement-photo" src="assets/photos/movement-basicsteps.png" alt="">
          <p class="t-body-bold">Basic Steps For Biginner</p>
          <p class="t-caption-regular dim">Creator</p>
        </a>
      </div>
    </section>

    <nav class="tabbar">
      <div class="tabs">
        <a href="index.html" class="active"><img src="assets/icons/nav-home.svg" alt="홈"><span class="dot"></span></a>
        <a href="packs.html"><img src="assets/icons/nav-packs.svg" alt="팩"></a>
        <a href="#"><img src="assets/icons/nav-stats.svg" alt="통계"></a>
        <a href="#"><img src="assets/icons/nav-profile.svg" alt="프로필"></a>
      </div>
      <div class="home-indicator"><span></span></div>
    </nav>
  </div>
</div>
</body>
</html>
