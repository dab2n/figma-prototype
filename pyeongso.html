<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=360, viewport-fit=cover">
<script src="assets/openext.js?v=725"></script>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEWTON">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="theme-color" content="#ffffff">
<title>Newton — Pack Detail (평소)</title>
<link rel="stylesheet" href="styles/main.css?v=725">
<link rel="stylesheet" href="styles/detail.css?v=725">
</head>
<body>
<div class="phone">
  <div class="screen detail-screen swipe-detail" id="swipeScreen">
    <div class="hero-photo" style="background-image:url('assets/photos/hero-sean-running.png');">
      <div class="status-bar on-dark" style="position:absolute; top:0; left:0; z-index:6;"><img class="statusbar-svg" src="assets/icons/statusbar-full-dark.svg" alt="9:41"></div>
      <div class="app-bar-transparent" style="top:44px;">
        <button class="icon-btn" onclick="location.href='packs.html'"><img src="assets/icons/appbar-back.svg" alt="뒤로"></button>
        <button class="kebab-tan"><img src="assets/icons/kebab-dots.svg" alt="더보기"></button>
      </div>

      <div class="detail-info">
        <div class="detail-text">
          <a class="author" href="ollilttae.html">
            <img src="assets/icons/avatar-ellipse-sean.png" alt="">
            <span class="author-name">Sean</span>
          </a>
          <p class="detail-title">Sean's Final 1km Pace</p>
          <p class="detail-desc">How to hold your pace when it falls apart in the last 1km of a run. Learn Sean's breathing rhythm and footfall tempo, then apply them to real runs with SAFE and BOOST modes.</p>
        </div>
        <div class="detail-actions">
          <div class="action-pill"><img src="assets/icons/detail-bookmark.svg" alt="북마크"><span>124</span></div>
          <div class="action-pill"><img src="assets/icons/detail-share.svg" alt="공유"><span>888+</span></div>
        </div>
      </div>

      <div class="fire-icons">
        <span class="fire fire2"></span>
        <span class="fire fire1"></span>
      </div>
    </div>

    <!-- Bottom sheet: swipe up morphs 평소 → 1회 진입, swipe up again → 올릴때 -->
    <div class="detail-sheet" id="detailSheet">
      <div class="sheet-joined">
        <div class="joined-row">
          <div class="joined-people">
            <div class="joined-avatars">
              <img src="assets/photos/packs-avatar1.png" alt="">
              <img src="assets/photos/packs-avatar2.png" alt="">
              <img src="assets/photos/joined-avatar-jiwoo.png" alt="">
            </div>
            <p>877 joined this week</p>
          </div>
          <a class="start-btn" href="setup-location.html">Start <img src="assets/icons/btn-arrow-sm-right.svg" alt=""></a>
        </div>
      </div>

      <div class="sheet-explore">
        <a class="explore-row" href="ollilttae.html">
          <img src="assets/icons/explore-chevron-up.svg" alt="">
          <span>Explore Packs</span>
        </a>
      </div>
    </div>

    <!-- Phone's own bottom bar — stays pinned, never rides the Explore Packs push. -->
    <div class="home-indicator-row"><span></span></div>
  </div>
</div>

<script>
(function () {
  var screen = document.getElementById('swipeScreen');
  var hero = screen.querySelector('.hero-photo');
  var sheet = document.getElementById('detailSheet');
  var COMMIT = 150;                 // px of upward push that commits to 올릴때
  var pushed = 0, committing = false, gestured = false;

  function isExpanded() { return screen.classList.contains('expanded'); }

  // In 1회진입, an upward scroll/drag gradually pushes the WHOLE page up — the photo
  // AND the Explore Packs container (black strip + up-arrow) move together as one,
  // so it reads as a continuous page transition; past COMMIT it hands off to 올릴때.
  function setPush(px, animate) {
    pushed = Math.max(0, Math.min(px, COMMIT + 24));
    var t = pushed ? 'translateY(' + (-pushed) + 'px)' : '';
    hero.style.transition = animate ? 'transform .32s ease, border-radius .32s ease' : 'none';
    hero.style.transform = t;
    hero.style.borderRadius = pushed ? '0 0 40px 40px' : '';
    sheet.style.transition = animate ? 'transform .32s ease' : 'none';
    sheet.style.transform = t;
    screen.style.setProperty('--push', pushed + 'px');   // concave fillets ride up too
    if (pushed >= COMMIT && !committing) { committing = true; window.location.href = 'ollilttae.html'; }
  }

  // Pointer (touch / mouse drag)
  var startY = null;
  screen.addEventListener('pointerdown', function (e) { startY = e.clientY; gestured = false; });
  screen.addEventListener('pointermove', function (e) {
    if (startY === null || !isExpanded()) return;
    var dy = e.clientY - startY;
    if (dy < 0 || pushed > 0) { gestured = true; setPush(-dy, false); }
  });
  screen.addEventListener('pointerup', function (e) {
    if (startY === null) return;
    var dy = e.clientY - startY; startY = null;
    if (!isExpanded()) {
      if (dy < -45) { gestured = true; screen.classList.add('expanded'); }   // 평소 → 1회진입
    } else if (!committing) {
      if (pushed > 0) setPush(0, true);                                      // released early → snap back
      else if (dy > 45) { gestured = true; screen.classList.remove('expanded'); } // 1회진입 → 평소
    }
  });
  screen.addEventListener('pointercancel', function () {
    startY = null; if (!committing && pushed > 0) setPush(0, true);
  });
  // Suppress the click that follows a real drag (so links don't fire on snap-back)
  screen.addEventListener('click', function (e) {
    if (gestured) { e.preventDefault(); e.stopPropagation(); gestured = false; }
  }, true);

  // Wheel (desktop): accumulate the push; snap back if it stalls below COMMIT.
  var toggleLock = false, stall;
  screen.addEventListener('wheel', function (e) {
    if (!isExpanded()) {
      if (e.deltaY > 10 && !toggleLock) { toggleLock = true; setTimeout(function(){toggleLock=false;},420); screen.classList.add('expanded'); }
      return;
    }
    if (committing) return;
    if (e.deltaY > 0 || pushed > 0) {
      setPush(pushed + e.deltaY, false);
    } else if (!toggleLock) {
      toggleLock = true; setTimeout(function(){toggleLock=false;},420); screen.classList.remove('expanded');
    }
    clearTimeout(stall);
    stall = setTimeout(function () { if (!committing && pushed > 0) setPush(0, true); }, 220);
  }, { passive: true });
})();

// Tap the title/description to expand the clamped description (tap again to collapse).
(function () {
  var text = document.querySelector('.detail-text');
  var desc = text && text.querySelector('.detail-desc');
  if (!desc) return;
  var collapsing = false;
  function onEnd(e) {
    if (e.propertyName !== 'max-height') return;
    desc.removeEventListener('transitionend', onEnd);
    if (collapsing) {
      // Reapply the 2-line clamp/ellipsis only AFTER the shrink finishes, so the
      // box is already at 42px — no reflow jump ("둠칫") mid-animation.
      text.classList.remove('desc-open');
      desc.style.maxHeight = '';
      collapsing = false;
    }
  }
  text.addEventListener('click', function (e) {
    if (e.target.closest('.author')) return;   // let the author avatar/link navigate
    desc.removeEventListener('transitionend', onEnd);
    if (text.classList.contains('desc-open')) {
      collapsing = true;                                 // stays unclamped while shrinking
      desc.style.maxHeight = desc.scrollHeight + 'px';
      void desc.offsetHeight;                            // lock the start height
      desc.style.maxHeight = '42px';                     // spring down to 2 lines
      desc.addEventListener('transitionend', onEnd);
    } else {
      collapsing = false;
      text.classList.add('desc-open');                   // unclamp, then spring up to full
      desc.style.maxHeight = desc.scrollHeight + 'px';
    }
  });
})();

// Tag the cross-document view transition so 1회진입 → 올릴때 slides up,
// and 올릴때 → 1회진입 (back) slides down (see main.css slide-* keyframes).
window.addEventListener('pageswap', function (e) {
  if (!e.viewTransition) return;
  var to = (e.activation && e.activation.entry && e.activation.entry.url) || '';
  if (to.indexOf('ollilttae.html') !== -1) e.viewTransition.types.add('detail-in');
});
window.addEventListener('pagereveal', function (e) {
  if (!e.viewTransition) return;
  var from = (e.activation && e.activation.from && e.activation.from.url) || '';
  if (from.indexOf('ollilttae.html') !== -1) e.viewTransition.types.add('detail-out');
});
</script>
</body>
</html>
