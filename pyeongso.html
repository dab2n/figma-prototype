<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=360, initial-scale=1">
<title>Newton — Pack Detail (평소)</title>
<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="styles/detail.css">
</head>
<body>
<div class="phone">
  <div class="screen detail-screen swipe-detail" id="swipeScreen">
    <div class="hero-photo" style="background-image:url('assets/photos/hero-sean-running.png');">
      <div class="status-bar on-dark"><img class="statusbar-svg" src="assets/icons/statusbar-full-dark.svg" alt="9:41"></div>
      <div class="app-bar-transparent">
        <button class="icon-btn" onclick="history.back()"><img src="assets/icons/appbar-back.svg" alt="뒤로"></button>
        <button class="handle-btn"><img src="assets/icons/appbar-handle.svg" alt="더보기"></button>
      </div>

      <div class="side-actions">
        <div class="pill"><img src="assets/icons/icon-bookmark-count.svg" alt="북마크"><span>124</span></div>
        <div class="pill"><img src="assets/icons/icon-bookmark.svg" alt="공유"><span>888+</span></div>
      </div>

      <div class="hero-content">
        <a class="author" href="ollilttae.html">
          <img src="assets/icons/avatar-ellipse-sean.png" alt="">
          <span class="t-body-bold">Sean</span>
        </a>
        <p class="title t-display-d1">Sean's Final 1km Pace</p>
        <p class="desc">How to hold your pace when it falls apart in the last 1km of a run. Learn Sean's breathing rhythm and footfall tempo, then apply them to real runs with SAFE and BOOST modes.</p>
      </div>
    </div>

    <!-- Bottom sheet: swipe up morphs 평소 → 1회 진입, swipe up again → 올릴때 -->
    <div class="detail-sheet" id="detailSheet">
      <span class="sheet-grabber"></span>

      <div class="sheet-joined">
        <div class="joined-row">
          <div class="joined-people">
            <div class="joined-avatars">
              <img src="assets/photos/packs-avatar1.png" alt="">
              <img src="assets/photos/packs-avatar2.png" alt="">
            </div>
            <p>877 joined this week</p>
          </div>
          <a class="start-btn" href="#">Start <img src="assets/icons/btn-arrow-sm-right.svg" alt=""></a>
        </div>
      </div>

      <div class="sheet-explore">
        <a class="explore-row" href="ollilttae.html">
          <img src="assets/icons/explore-chevron-up.svg" alt="">
          <span>Explore Packs</span>
        </a>
      </div>

      <div class="home-indicator-row"><span></span></div>
    </div>
  </div>
</div>

<script>
(function () {
  var screen = document.getElementById('swipeScreen');
  var busy = false;                 // debounce during navigation

  // Arriving back from 올릴때 (swipe down) lands in the 1회 진입 state
  if (new URLSearchParams(location.search).get('state') === 'expanded') {
    screen.classList.add('expanded');
  }

  // state 0 = 평소, state 1 = 1회 진입.  A further swipe up → 올릴때 (ollilttae.html)
  function isExpanded() { return screen.classList.contains('expanded'); }

  function up() {
    if (busy) return;
    if (!isExpanded()) {
      screen.classList.add('expanded');          // 평소 → 1회 진입 (in place)
    } else {
      busy = true;
      window.location.href = 'ollilttae.html';    // 1회 진입 → 올릴때
    }
  }
  function down() {
    if (busy) return;
    if (isExpanded()) screen.classList.remove('expanded');  // 1회 진입 → 평소
  }

  // Pointer drag (works for touch + mouse)
  var startY = null, lastSwipe = 0;
  screen.addEventListener('pointerdown', function (e) { startY = e.clientY; });
  screen.addEventListener('pointerup', function (e) {
    if (startY === null) return;
    var dy = e.clientY - startY;
    startY = null;
    if (dy < -45) { lastSwipe = Date.now(); up(); }
    else if (dy > 45) { lastSwipe = Date.now(); down(); }
  });
  screen.addEventListener('pointercancel', function () { startY = null; });

  // Swallow the synthetic click that trails a drag, so one swipe = one step
  // (without this the trailing click can hit the Explore Packs link mid-swipe)
  screen.addEventListener('click', function (e) {
    if (Date.now() - lastSwipe < 400) { e.preventDefault(); e.stopPropagation(); }
  }, true);

  // Wheel / trackpad (desktop preview convenience)
  var wheelLock = false;
  screen.addEventListener('wheel', function (e) {
    if (wheelLock) return;
    if (Math.abs(e.deltaY) < 12) return;
    wheelLock = true;
    setTimeout(function () { wheelLock = false; }, 500);
    if (e.deltaY > 0) up(); else down();
  }, { passive: true });
})();
</script>
</body>
</html>
