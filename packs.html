<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta http-equiv="cache-control" content="no-cache">
<meta name="viewport" content="width=360, viewport-fit=cover">
<script src="assets/openext.js?v=753"></script>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEWTON">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="theme-color" content="#ffffff">
<title>Newton — Packs</title>
<link rel="stylesheet" href="styles/main.css?v=753">
<link rel="stylesheet" href="styles/packs.css?v=753">
</head>
<body>
<div class="phone">
  <div class="screen packs-screen">
    <div class="status-bar" style="background:var(--color-neutral-50);"><img class="statusbar-svg" src="assets/icons/statusbar-full-fafafa.svg" alt="9:41"></div>

    <div class="app-bar" style="background:var(--color-neutral-50);">
      <p class="t-h1" style="margin:0;">Packs</p>
      <div class="actions">
        <img src="assets/icons/icon-search-black.svg" alt="검색">
        <img src="assets/icons/icon-plus-black.svg" alt="추가">
      </div>
    </div>

    <div class="filter-row">
      <button class="filter-btn"><img src="assets/icons/icon-filter.svg" alt="필터"></button>
      <div class="chips">
        <span class="chip chip-selected">All</span>
        <span class="chip">Outdoor</span>
        <span class="chip">Indoor</span>
        <span class="chip">Sports <img src="assets/icons/icon-chip-chevron.svg" alt=""></span>
        <span class="chip">Pack Type <img src="assets/icons/icon-chip-chevron.svg" alt=""></span>
      </div>
    </div>

    <div class="pack-list">
      <a class="pack-card" href="pyeongso.html">
        <div class="pack-thumb" style="background-image:url('assets/photos/packs-card1-thumb.png'); height:189px;">
          <div class="pack-thumb-top">
            <div class="pack-person">
              <img class="pack-avatar-sm" src="assets/photos/packs-profile-kanni.png" alt="">
              <span class="t-caption-bold" style="color:#fff;">Kanni</span>
            </div>
            <span class="badge">NEW</span>
          </div>
          <div class="pack-stack">
            <img src="assets/photos/packs-avatar1.png" alt="">
            <img src="assets/photos/packs-avatar2.png" alt="">
          </div>
        </div>
        <div class="pack-info">
          <p class="t-subtitle-b" style="margin:0;">Sprint Without Limits</p>
          <div class="pack-meta t-caption-regular"><span>Creator Pack</span><img class="sep" src="assets/icons/dot-tiny1.svg" alt=""><span>7m</span></div>
        </div>
      </a>

      <a class="pack-card" href="pyeongso.html">
        <div class="pack-thumb" style="background-image:url('assets/photos/packs-card2-thumb.png'); height:517px; background-position: bottom;">
          <div class="pack-thumb-top">
            <div class="pack-person">
              <img class="pack-avatar-sm" src="assets/photos/packs-profile-sean.png" alt="">
              <span class="t-caption-bold" style="color:#fff;">Sean</span>
            </div>
            <span class="badge badge-dark badge-hot"><img src="assets/icons/fire-sharp.svg" alt="">HOT</span>
          </div>
          <div class="pack-stack">
            <img src="assets/photos/packs-avatar4.png" alt="">
            <img src="assets/photos/packs-avatar1.png" alt="">
            <img src="assets/photos/packs-avatar2.png" alt="">
          </div>
        </div>
        <div class="pack-info">
          <p class="t-subtitle-b" style="margin:0;">Sean's Final 1km Pace</p>
          <div class="pack-meta t-caption-regular"><span>Creator Pack</span><img class="sep" src="assets/icons/dot-tiny1.svg" alt=""><span>7m</span></div>
        </div>
      </a>

      <a class="pack-card" href="packs-expanded.html">
        <div class="pack-thumb pack-thumb-dark" style="background-image:url('assets/photos/packs-card3-thumb.png'); height:173px;">
          <div class="pack-thumb-top">
            <div class="pack-person">
              <img class="pack-avatar-sm" src="assets/photos/packs-avatar-usainbolt.png" alt="">
              <span class="t-caption-bold" style="color:#fff;">Usain Bolt</span>
            </div>
          </div>
          <div class="pack-dots"><img src="assets/icons/dot-tiny2.svg" alt=""></div>
        </div>
        <div class="pack-info">
          <p class="t-subtitle-b" style="margin:0;">Usain Bolt's Sprint Masterclass</p>
          <div class="pack-meta t-caption-regular"><span>Pro Pack</span><img class="sep" src="assets/icons/dot-tiny1.svg" alt=""><span>7m</span></div>
        </div>
      </a>
    </div>

  </div>
  <nav class="tabbar">
    <div class="tabs">
      <a href="index.html"><img src="assets/icons/nav-home.svg" alt="홈"></a>
      <a href="packs.html" class="active"><img src="assets/icons/nav-packs.svg" alt="팩"><span class="dot"></span></a>
      <a href="progress.html"><img src="assets/icons/nav-stats.svg" alt="통계"></a>
      <a href="my.html"><img src="assets/icons/nav-profile.svg" alt="프로필"></a>
    </div>
    <div class="home-indicator"><span></span></div>
  </nav>
</div>
</body>
</html>
