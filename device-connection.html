<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta http-equiv="cache-control" content="no-cache">
<meta name="viewport" content="width=360, viewport-fit=cover">
<script src="assets/openext.js?v=783"></script>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEWTON">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="theme-color" content="#ffffff">
<title>Newton — Check your devices</title>
<link rel="stylesheet" href="styles/main.css?v=783">
<link rel="stylesheet" href="styles/setup.css?v=783">
<link rel="stylesheet" href="styles/ready.css?v=783">
</head>
<body>
<div class="phone">
  <div class="screen setup-screen" style="display:flex; flex-direction:column;">
    <div class="status-bar"><img class="statusbar-svg" src="assets/icons/statusbar-full.svg" alt="9:41"></div>

    <div class="setup-appbar">
      <a class="back" href="setup-complete.html" aria-label="뒤로"><img src="assets/icons/appbar-back.svg" alt="뒤로"></a>
    </div>

    <div class="setup-title">
      <h1>Please<br>Check your devices</h1>
      <p>Make sure your devices are connected and ready.</p>
    </div>

    <div class="dc-body">
      <section class="dc-sec">
        <p class="dc-label">Connected</p>
        <div class="dc-list">
          <div class="dc-card">
            <div class="dc-left">
              <span class="dc-ic"><img src="assets/icons/dev-lowerbody.png?r=1" alt=""></span>
              <div><p class="dc-name">Lower-Body Wearable</p><p class="dc-meta">Battery 87%</p></div>
            </div>
            <img class="dc-state dc-check" src="assets/icons/dev-check.svg" alt="연결됨">
          </div>
          <div class="dc-card">
            <div class="dc-left">
              <span class="dc-ic"><img src="assets/icons/dev-station.png?r=1" alt=""></span>
              <div><p class="dc-name">Station</p><p class="dc-meta">Projection ready</p></div>
            </div>
            <img class="dc-state dc-check" src="assets/icons/dev-check.svg" alt="연결됨">
          </div>
        </div>
      </section>

      <section class="dc-sec">
        <p class="dc-label">Not Connected</p>
        <div class="dc-list">
          <div class="dc-card">
            <div class="dc-left">
              <span class="dc-ic"><img src="assets/icons/dev-watch.png?r=1" alt=""></span>
              <div><p class="dc-name">Watch·External Device</p><p class="dc-meta">Optional</p></div>
            </div>
            <img class="dc-state" src="assets/icons/dev-plus.svg" alt="추가">
          </div>
        </div>
      </section>
    </div>
  </div>

  <nav class="tabbar setup-stepbar dc-bottom">
    <div class="sb-row">
      <a class="sb-next ready" href="ready-to-start.html">Next <img src="assets/icons/arrow-right-lg.svg" alt=""></a>
    </div>
    <div class="home-indicator"><span></span></div>
  </nav>
</div>
</body>
</html>
